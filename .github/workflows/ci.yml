name: Multi-OS CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: ${{ matrix.os }} | Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build TypeScript
        run: npm run build

      - name: Run project
        env:
          CI: true
        run: npm run start

  random-spell:
    name: Sincronização de Configurações de Plataforma
    runs-on: ubuntu-latest
    steps:
      - name: Lançando Feitiço
        run: |
          echo "Feitiço lançado: agora o professor vai me dar nota 10 na atividade!"